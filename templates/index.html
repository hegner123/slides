<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slides</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            color: #e0e0e0;
            background: #0a0e1a;
        }

        /* Section 1: Hero gradient - dark navy with magenta bottom-left, teal bottom-right */
        .hero {
            padding: 80px 60px 60px;
            background:
                radial-gradient(ellipse at 0% 100%, rgba(196, 20, 134, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 100% 100%, rgba(10, 138, 138, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, #0a0e1a 0%, #0d1b2a 100%);
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #e91e9c, #00d4aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            margin-top: 12px;
            font-size: 1.1rem;
            color: #8899aa;
        }

        /* Section 2: Grid area - deep purple to navy */
        .grid-section {
            flex: 1;
            padding: 40px 60px 80px;
            background:
                radial-gradient(ellipse at 20% 0%, #4a1a5e33 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, #0a8a8a22 0%, transparent 60%),
                linear-gradient(180deg, #0d1b2a 0%, #0a0e1a 100%);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .card {
            background: linear-gradient(145deg, #1a1a3a 0%, #0d1b2a 100%);
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 32px 24px;
            text-decoration: none;
            color: #e0e0e0;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #c41486, #6b2080, #0a8a8a);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .card:hover {
            border-color: #4a1a5e;
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(196, 20, 134, 0.15), 0 4px 16px rgba(10, 138, 138, 0.1);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-number {
            font-size: 0.75rem;
            font-weight: 600;
            color: #9b6bb0;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1.3;
        }

        /* Section 3: Footer gradient - teal to magenta */
        .footer {
            padding: 40px 60px;
            text-align: center;
            font-size: 0.85rem;
            color: #445566;
            background:
                radial-gradient(ellipse at 30% 50%, #c4148611 0%, transparent 50%),
                radial-gradient(ellipse at 70% 50%, #0a8a8a11 0%, transparent 50%),
                #0a0e1a;
            border-top: 1px solid #1a1a3a;
        }

        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 0;
            color: #445566;
            font-size: 1.1rem;
        }

        .empty code {
            background: #1a1a3a;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.95rem;
        }

        @media (max-width: 1024px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            .hero, .grid-section { padding-left: 32px; padding-right: 32px; }
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <section class="hero">
        <h1>Slides</h1>
        <p>{{len .}} deck{{if ne (len .) 1}}s{{end}} available</p>
    </section>

    <section class="grid-section">
        <div class="grid">
            {{if .}}
                {{range .}}
                <a class="card" href="/deck/{{.Slug}}/">
                    <div class="card-number">Deck {{.Position}}</div>
                    <div class="card-title">{{.Title}}</div>
                </a>
                {{end}}
            {{else}}
                <div class="empty">
                    No decks found. Create a directory with an <code>index.html</code> to get started.
                </div>
            {{end}}
        </div>
    </section>

    <section class="footer">
        Slide decks auto-discovered from subdirectories
    </section>
</body>
</html>
